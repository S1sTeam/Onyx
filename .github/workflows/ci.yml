name: onyx-ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-e2e:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Toolchain versions
        shell: pwsh
        run: |
          java -version
          mvn -version

      - name: Build Onyx distribution
        shell: pwsh
        run: ./scripts/build-onyx.ps1

      - name: Initialize runtime files
        shell: pwsh
        run: ./scripts/run-onyx.ps1 -InitOnly

      - name: Core protocol checks
        shell: pwsh
        run: |
          ./scripts/e2e-status.ps1
          ./scripts/e2e-status-online.ps1
          ./scripts/e2e-login.ps1
          ./scripts/e2e-proxy-routing.ps1
          ./scripts/e2e-proxy-failover.ps1
          ./scripts/e2e-forwarding-auth.ps1

      - name: Play full regression
        shell: pwsh
        run: ./scripts/e2e-play-full.ps1

      - name: Play anti-crash (lite)
        shell: pwsh
        run: ./scripts/e2e-play-anti-crash.ps1 -MalformedConnections 40 -BackendPort 48976

      - name: Play benchmark snapshot
        shell: pwsh
        run: ./scripts/e2e-play-benchmark.ps1 -Iterations 1 -BaseBackendPort 49100 -ReportPath target/e2e-play-benchmark.csv

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: onyx-dist-and-reports
          if-no-files-found: warn
          path: |
            dist/**
            target/e2e-play-benchmark.csv
